<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d5c3d" />
    <meta name="description" content="BinRoute Ghana — alert your collector when your bin is full, track pickup, pay with Mobile Money." />
    <title>BinRoute Ghana</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <script>
      if (location.protocol === "file:") {
        document.body.innerHTML =
          '<div style="font-family:system-ui;max-width:420px;margin:40px auto;padding:20px">' +
          "<h1>Start the server first</h1>" +
          "<p>Double-click <code>start-server.bat</code> in the binroute folder, then open:</p>" +
          "<p style='font-size:1.2rem'><a href='http://127.0.0.1:8094'>http://127.0.0.1:8094</a></p>" +
          "</div>";
      }
    </script>
    <div id="app">
      <header class="top-bar">
        <div class="brand">
          <span class="brand-icon" aria-hidden="true">♻</span>
          <div>
            <strong>BinRoute</strong>
            <small>Ghana</small>
          </div>
        </div>
        <button type="button" id="btn-logout" class="btn-ghost hidden" hidden>Sign out</button>
      </header>
      <main id="main"></main>
      <nav id="nav" class="bottom-nav hidden" hidden></nav>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
